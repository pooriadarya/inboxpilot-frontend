<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InboxPilot</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f2f2f7;
      color: #111;
    }
    .container {
      padding: 20px;
    }
    h1 {
      margin-top: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .urgent {
      color: #d0021b;
      font-weight: 600;
      font-size: 12px;
    }
    .priority {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Today’s Focus</h1>
    <p id="count">Loading…</p>
    <div id="list"></div>
  </div>

  <script>
    const API_URL = "ttps://inboxpilot-backend.onrender.com";

    fetch(API_URL + "/focus")
      .then(res => res.json())
      .then(data => {
        document.getElementById("count").innerText =
          data.items.length + " items need your attention today";

        const list = document.getElementById("list");
        data.items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="urgent">${item.category.toUpperCase()}</div>
            <h3>${item.subject}</h3>
            <p>${item.summary}</p>
            <div class="priority">Priority: ${item.priority}</div>
          `;
          list.appendChild(card);
        });
      });
  </script>
</body>
</html>
