<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InboxPilot</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #111;
    --secondary: #8e8e93;
    --danger: #ff3b30;
    --accent: #007aff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #ffffff;
      --secondary: #a1a1a6;
    }
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s ease, color 0.3s ease;
  }

  .container {
    padding: 20px 16px 40px;
    max-width: 520px;
    margin: auto;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
  }

  #count {
    color: var(--secondary);
    font-size: 14px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transition: transform 0.15s ease, opacity 0.15s ease;
    touch-action: pan-y;
  }

  .card:active {
    transform: scale(0.97);
  }

  .urgent {
    color: var(--danger);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  button {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 16px;
    padding: 0;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Today’s Focus</h1>
    <p id="count">Loading…</p>
    <div id="list"></div>
  </div>

  <script>
  const API_URL = "https://inboxpilot-backend.onrender.com";
  const list = document.getElementById("list");
  const count = document.getElementById("count");

  document.body.style.transition = "opacity 0.2s ease";

  function haptic(type = "light") {
    if (navigator.vibrate) {
      navigator.vibrate(type === "light" ? 10 : 30);
    }
  }

  function loadData() {
    count.innerText = "Refreshing…";
    list.innerHTML = "";

    fetch(API_URL + "/focus")
      .then(res => res.json())
      .then(data => {
        count.innerText =
          `📬 ${data.items.length} items need your attention today`;

        data.items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";

          // ✅ NEW iOS-style swipe logic
let startX = 0;
let moved = false;

card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  moved = false;
  card.style.transition = "none";
});

card.addEventListener("touchmove", e => {
  const diff = e.touches[0].clientX - startX;
  if (diff > 0) {
    card.style.transform = `translateX(${diff}px)`;
    moved = true;
  }
});

card.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientX - startX;
  card.style.transition = "transform 0.2s ease";

  if (diff > 120) {
    card.style.transform = "translateX(120%)";
    card.style.opacity = 0;
    setTimeout(() => card.remove(), 200);
  } else {
    card.style.transform = "translateX(0)";
    if (!moved) showDetail(item);
  }
});

          card.innerHTML = `
            <div class="urgent">⏰ ${item.category.toUpperCase()}</div>
            <h3>${item.subject}</h3>
            <p style="color:var(--secondary);">${item.summary}</p>
            <div style="font-size:12px;">⭐ Priority ${item.priority}</div>
          `;

          list.appendChild(card);
        });
      });
  }

  function showDetail(item) {
    haptic();
    document.body.style.opacity = 0;

    setTimeout(() => {
      document.body.innerHTML = `
        <div class="container">
          <button onclick="location.reload()">← Inbox</button>
          <h2>${item.subject}</h2>
          <p><strong>From:</strong> ${item.sender}</p>
          <p>${item.summary}</p>
          <h3>Suggested Actions</h3>
          <ul>
            ${item.actions.map(a => `<li>✅ ${a}</li>`).join("")}
          </ul>
        </div>
      `;
      document.body.style.opacity = 1;
    }, 120);
  }

  // Pull to refresh
  let startY = 0;
  window.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
  });

  window.addEventListener("touchend", e => {
    if (window.scrollY === 0 && e.changedTouches[0].clientY - startY > 100) {
      haptic("medium");
      loadData();
    }
  });

  loadData();
</script>
</body>
</html>
