<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InboxPilot</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f2f2f7;
      color: #111;
    }
    .container {
      padding: 20px;
    }
    h1 {
      margin-top: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .urgent {
      color: #d0021b;
      font-weight: 600;
      font-size: 12px;
    }
    .priority {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Today’s Focus</h1>
    <p id="count">Loading…</p>
    <div id="list"></div>
  </div>

  <script>
  const API_URL = "https://inboxpilot-backend.onrender.com";
  const count = document.getElementById("count");
  const list = document.getElementById("list");

  count.innerText = "Fetching from backend…";

  fetch(API_URL + "/focus")
    .then(res => res.json())
    .then(data => {
      count.innerText = "SUCCESS: " + data.items.length + " items loaded";

      list.innerHTML = `
        <pre style="white-space:pre-wrap; font-size:12px;">
${JSON.stringify(data, null, 2)}
        </pre>
      `;
    })
    .catch(err => {
      count.innerText = "FETCH FAILED";
      list.innerHTML = `<p style="color:red;">${err}</p>`;
    });
</script>
</body>
</html>
